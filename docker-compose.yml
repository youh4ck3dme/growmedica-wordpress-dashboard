# GrowMedica WordPress + WooCommerce — local dev CMS
# Usage: docker compose --env-file .env.docker.local up -d
#        (or defaults below for quick start)
# CMS:   http://localhost:8080
# Admin: http://localhost:8080/wp-admin

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-growmedica}
      MYSQL_USER: ${MYSQL_USER:-growmedica}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-growmedica_local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_local}
    volumes:
      - woo_db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:6.7-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:80'
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-growmedica}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-growmedica_local}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-growmedica}
      WORDPRESS_TABLE_PREFIX: gm_
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      GROWMEDICA_STOREFRONT_URL: ${GROWMEDICA_STOREFRONT_URL:-http://host.docker.internal:5555}
      GROWMEDICA_REVALIDATION_SECRET: ${GROWMEDICA_REVALIDATION_SECRET:-local-dev-revalidation-secret-min-16-chars}
      GROWMEDICA_CORS_ORIGINS: ${GROWMEDICA_CORS_ORIGINS:-}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/wp-admin/install.php']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - woo_wp:/var/www/html
      - ./wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

volumes:
  woo_db:
  woo_wp:
