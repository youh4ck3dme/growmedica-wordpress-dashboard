<!DOCTYPE html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#35C79A" />
    <title>Bez pripojenia – GrowMedica.sk</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f9fafb;
        color: #101615;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 400px;
        text-align: center;
        background: #fff;
        padding: 40px 24px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 4px 6px rgba(16, 22, 21, 0.08);
      }
      h1 {
        margin-top: 16px;
        font-size: 1.5rem;
      }
      p {
        margin-top: 12px;
        color: #6b7280;
        line-height: 1.6;
        font-size: 0.95rem;
      }
      button {
        margin-top: 24px;
        background: #35c79a;
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
      }
      button:hover {
        background: #2aa882;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div aria-hidden="true" style="font-size: 3rem">📡</div>
      <h1>Bez pripojenia k internetu</h1>
      <p>Vyzerá to, že nemáte pripojenie. Skúste sa znovu pripojiť a obnovte stránku.</p>
      <button type="button" onclick="location.reload()">Obnoviť stránku</button>
    </div>
  </body>
</html>
